<div id="duel" class="screen">
  <div class="g-header">
    <div class="g-logo" id="d-logo">Contorno</div>
    <div class="duel-score-bar">
      <div class="duel-player-box active" id="d-box-a">
        <div class="duel-pname">Jogador A</div>
        <div class="duel-pscore" id="d-sa">0</div>
      </div>
      <span class="duel-sep">VS</span>
      <div class="duel-player-box" id="d-box-b">
        <div class="duel-pname">Jogador B</div>
        <div class="duel-pscore" id="d-sb">0</div>
      </div>
    </div>
    <button class="g-quit" id="d-quit">Sair</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="d-prog" style="width:0%"></div>
  </div>

  <div class="map-area" id="duel-map-area">
    <svg id="duel-svg"></svg>
    <div class="zoom-controls">
      <button class="btn-zoom btn-locate" id="d-btn-locate" title="Localizar país">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="2" x2="12" y2="4.5"/>
          <line x1="12" y1="19.5" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="4.5" y2="12"/>
          <line x1="19.5" y1="12" x2="22" y2="12"/>
        </svg>
      </button>
      <button class="btn-zoom" id="d-zoom-in"  title="Aproximar (+)">+</button>
      <button class="btn-zoom" id="d-zoom-out" title="Afastar (−)">−</button>
    </div>
    <div class="map-tooltip" id="d-tooltip"></div>
  </div>

  <div class="g-bottom" style="padding-top:0">
    <div class="duel-active-banner pa">
      <div class="duel-active-dot"></div>
      <div class="duel-active-name" id="d-active-name">Jogador A</div>
      <div class="duel-active-sub"  id="d-turn">Pergunta 1/10</div>
    </div>
    <div class="bottom-info" style="margin-top:.6rem">
      <div class="pts-label">Disponível: <span id="d-pts">2.000</span></div>
    </div>
    <div class="input-row">
      <input class="ans-input" id="d-ans" type="text" placeholder="Digite o nome do país…"
             autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="btn-confirm" id="d-submit">Confirmar</button>
      <button class="btn-giveup"  id="d-giveup">Desistir</button>
    </div>
    <div class="feedback" id="d-feedback"></div>
  </div>

  <div id="duel-turn-toast" aria-hidden="true">
    <div class="dtt-card">
      <div class="dtt-name" id="dtt-name">Jogador A</div>
      <div class="dtt-sub"  id="dtt-sub">Pergunta 1/10</div>
    </div>
  </div>
</div>

<div id="duel-results" class="screen">
  <div class="r-logo">Contorno</div>

  <div class="duel-winner-card">
    <div class="duel-winner-text" id="d-winner-text">—</div>
  </div>

  <div class="duel-final-scores">
    <div>Jogador A<br><strong id="dr-sa">0</strong></div>
    <div>Jogador B<br><strong id="dr-sb">0</strong></div>
  </div>

  <div class="r-actions">
    <button class="btn-mode"      id="d-btn-again" style="max-width:200px">Jogar Novamente</button>
    <button class="btn-secondary" id="d-btn-home">Início</button>
  </div>
</div>
